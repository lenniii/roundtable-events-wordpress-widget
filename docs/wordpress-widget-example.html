<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roundtable Events Widget Example</title>
    <style>
      body {
        margin: 0;
        padding: 40px 20px;
        font-family: Georgia, serif;
        background: #f5f1e8;
        color: #1f2937;
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        max-width: 70ch;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WordPress Page Example</h1>
      <p>
        This page simulates a WordPress template. The widget bundle auto-mounts into the
        container below as soon as the script loads.
      </p>

      <div id="events-widget" data-theme="dark"></div>
    </main>

    <script>
      const events = [
        {
          id: 294,
          title: "RT36 VERONA - CONVIVIALE",
          metaLabel: "RT 36 Verona · Zona 1",
          location: "MR MARTINI",
          startDate: "2026-04-09T20:00:00+02:00",
          endDate: "2026-04-09T22:00:00+02:00",
          imageUrl:
            "https://roundtable-prd.s3.eu-central-1.amazonaws.com/1989/cover_picture/56c3310e-06b6-4eb4-9335-16b1335446ec.jpeg",
          eventUrl: "https://events.roundtable.it/activity/2026-04-09-rt36-verona-conviviale/",
          mapsUrl: "https://www.google.com/maps/search/?api=1&query=MR%20MARTINI",
          calendarUrl:
            "https://www.google.com/calendar/render?action=TEMPLATE&text=RT36%20VERONA%20-%20CONVIVIALE",
          description: "RT36 VERONA - CONVIVIALE",
        },
      ];

      document.getElementById("events-widget").dataset.events = JSON.stringify(events);
    </script>
    <script src="../dist/roundtable-events-widget.js"></script>
  </body>
</html>
